name: Build and Release

on:
  push:
    tags:
      - 'v*'        # triggers on v1.0.0, v1.2.3 etc
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build and publish Electron app
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # auto provided by GitHub — no setup needed
          CSC_IDENTITY_AUTO_DISCOVERY: false        # skip code signing (add certs later if needed)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/
          if-no-files-found: warn
