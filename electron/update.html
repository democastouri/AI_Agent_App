<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Available</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      user-select: none;
    }

    .card {
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 52px;
      height: 52px;
      background: #eef2ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 24px;
    }

    h1 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #111;
    }

    .version-badge {
      display: inline-block;
      background: #eef2ff;
      color: #4f46e5;
      font-size: 12px;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .notes {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 20px;
      background: #f9f9f9;
      border-radius: 8px;
      padding: 10px 14px;
      text-align: left;
      max-height: 70px;
      overflow-y: auto;
    }

    .progress-wrap {
      display: none;
      margin-bottom: 16px;
    }

    .progress-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      text-align: left;
    }

    .progress-bar-bg {
      background: #e5e7eb;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: #4f46e5;
      height: 100%;
      width: 0%;
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      flex: 1;
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    button:hover {
      opacity: 0.85;
    }

    button:active {
      opacity: 0.7;
    }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-install {
      background: #16a34a;
      color: #fff;
      display: none;
    }

    .status-text {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
      min-height: 16px;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1c1c1e;
        color: #f0f0f0;
      }

      .icon {
        background: #2c2c54;
      }

      h1 {
        color: #f0f0f0;
      }

      .notes {
        background: #2a2a2e;
        color: #ccc;
      }

      .btn-secondary {
        background: #3a3a3c;
        color: #e0e0e0;
      }

      .progress-bar-bg {
        background: #3a3a3c;
      }

      .version-badge {
        background: #2c2c54;
        color: #a5b4fc;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="icon">&#8593;</div>
    <h1>Update available</h1>
    <div class="version-badge" id="version-badge">v0.0.0</div>

    <div class="notes" id="release-notes">Loading release notes...</div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-label">Downloading update... <span id="percent">0</span>%</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="actions">
      <!-- <button class="btn-secondary" id="btn-skip" onclick="skip()">Skip</button> -->
      <button class="btn-primary" id="btn-download" onclick="download()">Download &amp; Install</button>
      <button class="btn-install" id="btn-install" onclick="install()">Restart &amp; Install</button>
    </div>

    <div class="status-text" id="status"></div>
  </div>

  <script>
    window.electronAPI.onUpdateInfo((info) => {
      document.getElementById('version-badge').textContent = 'v' + info.version
      document.getElementById('release-notes').textContent = info.releaseNotes
    })

    window.electronAPI.onDownloadProgress((percent) => {
      document.getElementById('progress-wrap').style.display = 'block'
      document.getElementById('btn-download').style.display = 'none'
      // document.getElementById('btn-skip').disabled = true
      document.getElementById('percent').textContent = percent
      document.getElementById('progress-fill').style.width = percent + '%'
      document.getElementById('status').textContent = 'Downloading...'
    })

    // Remove or ignore the skip function. 
    // Ensure the update flow is linear:
    window.electronAPI.onUpdateDownloaded(() => {
      document.getElementById('progress-wrap').style.display = 'none';
      document.getElementById('btn-install').style.display = 'block';
      // Keep the 'btn-download' hidden
      document.getElementById('btn-download').style.display = 'none';
      document.getElementById('status').textContent = 'Update ready. Please restart to install.';
    });

    function download() {
      window.electronAPI.downloadUpdate()
      document.getElementById('btn-download').disabled = true
      document.getElementById('btn-download').textContent = 'Downloading...'
      document.getElementById('status').textContent = 'Starting download...'
    }

    function install() {
      document.getElementById('status').textContent = 'Restarting...'
      window.electronAPI.installUpdate()
    }

    // function skip() {
    //   window.electronAPI.skipUpdate()
    // }
  </script>
</body>

</html>
